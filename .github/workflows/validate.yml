name: Validate Plugins

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Validate plugin.json files
        run: |
          for f in plugins/*/.claude-plugin/plugin.json; do
            echo "Checking $f..."
            python3 -c "import json,sys; json.load(open(sys.argv[1])); print('✓ Valid JSON')" "$f"
          done

      - name: Check plugin.json required fields
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          REQUIRED = ["name", "version", "description", "homepage", "repository", "license"]
          errors = []
          for f in pathlib.Path("plugins").glob("*/.claude-plugin/plugin.json"):
              data = json.loads(f.read_text())
              for field in REQUIRED:
                  if field not in data:
                      errors.append(f"{f}: missing required field '{field}'")
              author = data.get("author", {})
              if not isinstance(author, dict) or "email" not in author:
                  errors.append(f"{f}: missing 'author.email'")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print("✓ All plugin.json files have required fields")
          EOF

      - name: Validate marketplace.json
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))" && echo "✓ marketplace.json valid"

      - name: Check agent frontmatter — required fields
        run: |
          python3 - <<'EOF'
          import pathlib, re, sys
          errors = []
          for f in pathlib.Path("plugins").rglob("*.md"):
              if "/skills/" in str(f):
                  continue
              content = f.read_text()
              if not content.startswith("---"):
                  continue
              end = content.find("---", 3)
              if end == -1:
                  continue
              fm = content[3:end]
              if "name:" not in fm:
                  errors.append(f"{f}: missing 'name' in frontmatter")
              if "description:" not in fm:
                  errors.append(f"{f}: missing 'description' in frontmatter")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print("✓ All agent frontmatter valid")
          EOF

      - name: Check agent frontmatter — no forbidden fields
        run: |
          python3 - <<'EOF'
          import pathlib, re, sys
          FORBIDDEN = ["permissionMode", "context_cache", "output_schema", "next_agents", "hooks"]
          errors = []
          for f in pathlib.Path("plugins").rglob("*.md"):
              if "/skills/" in str(f):
                  continue
              content = f.read_text()
              if not content.startswith("---"):
                  continue
              end = content.find("---", 3)
              if end == -1:
                  continue
              fm = content[3:end]
              for field in FORBIDDEN:
                  if re.search(rf"^{field}:", fm, re.MULTILINE):
                      errors.append(f"{f}: forbidden field '{field}' in frontmatter")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print("✓ No forbidden frontmatter fields found")
          EOF

      - name: Run hook unit tests
        run: |
          pip install pytest ruff --quiet
          ruff check plugins/common/hooks/ evals/
          # pytest exit 5 = "no tests collected" (OK to skip). 그 외 비정상 종료는
          # 실제 실패이므로 CI를 실패시킨다 (이전 `|| echo`는 실패도 green으로 삼켰음).
          rc=0
          python3 -m pytest plugins/common/hooks/tests/ evals/tests/ -v || rc=$?
          # exit 5(수집 0)도 실패 — 테스트 220+개가 상존하는 레포에서 수집 0은
          # 전멸/경로 붕괴 신호다. verify-done §4와 fail-closed 방향 통일 (재감사 R2/ATK-004).
          if [ "$rc" -eq 5 ]; then echo "❌ No tests collected — 테스트 소실은 실패다"; exit 1; fi
          exit "$rc"

      - name: Security scan (gitleaks)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
