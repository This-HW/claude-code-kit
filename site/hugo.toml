baseURL = "https://This-HW.github.io/claude-code-kit/"
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
enableEmoji = true

# GitHub Pages 프로젝트 사이트: /claude-code-kit/ 하위 경로
# 자체 최소 테마(layouts/) 사용 — 외부 테마/모듈 의존 없음.
# 다국어: 기본 언어 ko는 루트(/), en은 /en/ 하위 경로에서 서비스한다.

[params]
  author = "This-HW"
  github = "https://github.com/This-HW/claude-code-kit"

[markup.goldmark.renderer]
  unsafe = true  # 포스트 내 인라인 HTML(다이어그램 등) 허용

[markup.highlight]
  noClasses = false
  style = "github"

[taxonomies]
  category = "categories"
  tag = "tags"

[languages]
  [languages.ko]
    label = "한국어"
    locale = "ko"
    weight = 1
    title = "claude-code-kit 로그"
    [languages.ko.params]
      description = "claude-code-kit 개발 과정 · 프로젝트 업데이트 · AI 에이전트 엔지니어링 트렌드 기록"
    [[languages.ko.menu.main]]
      name = "홈"
      pageRef = "/"
      weight = 1
    [[languages.ko.menu.main]]
      name = "시작하기"
      pageRef = "/getting-started"
      weight = 2
    [[languages.ko.menu.main]]
      name = "글"
      pageRef = "/posts"
      weight = 3
    [[languages.ko.menu.main]]
      name = "소개"
      pageRef = "/about"
      weight = 4
    [[languages.ko.menu.main]]
      name = "GitHub"
      url = "https://github.com/This-HW/claude-code-kit"
      weight = 5

  [languages.en]
    label = "English"
    locale = "en"
    weight = 2
    title = "claude-code-kit — Multi-Agent Development Toolkit"
    [languages.en.params]
      description = "claude-code-kit: a universal Claude Code toolkit — 33 specialized agents, 16 skills, and 13 governance rules for harness x loop engineering."
    [[languages.en.menu.main]]
      name = "Home"
      pageRef = "/"
      weight = 1
    [[languages.en.menu.main]]
      name = "Getting Started"
      pageRef = "/getting-started"
      weight = 2
    [[languages.en.menu.main]]
      name = "About"
      pageRef = "/about"
      weight = 3
    [[languages.en.menu.main]]
      name = "GitHub"
      url = "https://github.com/This-HW/claude-code-kit"
      weight = 4
