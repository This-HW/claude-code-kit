title = "claude-code-kit 로그"
enableRobotsTXT = true
enableEmoji = true

# GitHub Pages 프로젝트 사이트: /claude-code-kit/ 하위 경로
# 자체 최소 테마(layouts/) 사용 — 외부 테마/모듈 의존 없음.

[params]
  description = "claude-code-kit 개발 과정 · 프로젝트 업데이트 · AI 에이전트 엔지니어링 트렌드 기록"
  author = "This-HW"
  github = "https://github.com/This-HW/claude-code-kit"

