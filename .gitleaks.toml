title = "claude-code-kit gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "private-project-names"
description = "일반화된 private 프로젝트 패턴 (특정 이름 대신 패턴 사용)"
regex = '''[a-z][a-z0-9]+_(quant|optimizer|ops)'''
tags = ["private", "internal"]

[[rules]]
id = "internal-server-patterns"
description = "내부 서버/IP 패턴"
regex = '''(192\.168\.\d+\.\d+|10\.\d+\.\d+\.\d+|172\.(1[6-9]|2\d|3[01])\.\d+\.\d+)'''
tags = ["private", "internal"]

[allowlist]
description = "허용 목록"
paths = [
    '''.gitleaks.toml''',
    '''plugins/common/agents/dev/security-scan.md''',
    '''plugins/common/rules/CHECKSUMS.sha256''',
]
# CHANGELOG.md는 blanket 제외하지 않는다 — 실제 시크릿이 changelog에 붙어도 스캔되도록
# (적대적 리뷰). 산문상 "secret/token" 단어는 gitleaks의 엔트로피 패턴에 안 걸린다.
